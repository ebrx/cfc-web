<!doctype html>
<html lang="en" data-framework="javascript">

<head>
  <title>Cimbar Decoder</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <link rel="manifest" href="pwa-recv.json">
</head>

<body>

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100vh;
    }

    body {
      background-color: white;
      background-image: linear-gradient(135deg, rgb(0, 0, 0) 65px, transparent 130px),
        repeating-linear-gradient(135deg, rgb(0, 0, 0) 0px, rgb(153, 197, 206) 1px, transparent 1px, transparent 30px),
        repeating-linear-gradient(45deg, rgb(0, 0, 0) 0px, rgb(153, 197, 206) 1px, transparent 1px, transparent 30px);
      background-size: cover;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: black;
        color: white;
      }
    }

    #container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -100;
      overflow: hidden;
      /* Hide scrollbars */
    }

    video {
      height: 100%;
      width: 100%;
      z-index: -100;
      background-size: cover;
      transition: 1s opacity;
    }

    .statusbox {
      color: white;
      text-shadow: 1px 1px 1px green;
    }

    #progress_bars {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin-bottom: 1vh;
    }

    .progress {
      display: block;
      height: 1.2vh;
      margin-bottom: 1vh;
      background-color: white;
      border-top: 0.2vh inset navy;
      border-bottom: 0.4vh inset navy;
      border-right: 0.3vh inset navy;
      border-radius: 0 0.5vh 0.5vh 0;
      max-width: 100%;
      width: 0;
    }

    .crosshairs {
      border-color: white !important;
    }

    .crosshairs.scanning_xhairs {
      border-color: #FFFF00 !important;
    }

    .crosshairs.active_xhairs {
      border-color: #00FF00 !important;
    }

    #crosshair1 {
      position: fixed;
      top: 15%;
      right: 20%;
      width: 5%;
      height: 5%;
      z-index: -50;
      border-right: 5px groove;
      border-top: 5px groove;
      box-shadow: inset 0 0 0 4px #555,
    }

    #crosshair2 {
      position: fixed;
      bottom: 20%;
      left: 15%;
      width: 5%;
      height: 5%;
      z-index: -50;
      border-left: 5px groove;
      border-bottom: 5px groove;
      box-shadow: inset 0 0 0 4px #555,
    }

    #nav-container:focus-within {
      z-index: 1;
    }

    #nav-content,
    #nav-container .bg,
    #nav-container:focus-within #nav-button {
      z-index: 1;
    }

    /* options */
    #nav-container a.mode-auto,
    #nav-container a.mode-b {
      color: #555;
    }

    #nav-container.mode-auto a.mode-auto,
    #nav-container.mode-b a.mode-b {
      color: #9fa6b2;
    }

    /* nav stuff */
    /* built off of https://codepen.io/dannievinther/pen/NvZjvz */
    #nav-container {
      position: fixed;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #nav-container .bg {
      pointer-events: auto;
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      visibility: hidden;
      opacity: 0;
      transition: .3s;
      background: black;
    }

    #nav-container:focus-within .bg {
      visibility: visible;
      opacity: .6;
    }

    #nav-container * {
      visibility: visible;
    }

    #nav-button {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 60px;
      width: 30px;
      margin-left: 15px;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
      border: 0;
      outline: 0;
      background-image: linear-gradient(180deg, rgb(0, 0, 0, 0) 10%, rgb(0, 0, 0) 40%, rgb(0, 0, 0) 60%, rgb(0, 0, 0, 0) 90%);
      background-color: initial;
    }

    #nav-button.hide {
      opacity: 0;
      transition: .3s;
    }

    #nav-container:focus-within #nav-button.hide {
      opacity: 1;
    }

    .icon-bar {
      display: block;
      width: 100%;
      height: 3px;
      transition: .3s;
    }

    .icon-bar+.icon-bar {
      margin-top: 3px;
    }

    #nav-container .icon-bar:nth-of-type(1) {
      background-color: #00ff00;
      box-shadow: 0px 0px 5px #00ff00, 0px 0px 2px #00ff00;
    }

    #nav-container .icon-bar:nth-of-type(2) {
      background-color: #ffff00;
      box-shadow: 0px 0px 5px #ffff00, 0px 0px 2px #ffff00;
    }

    #nav-container .icon-bar:nth-of-type(3) {
      background-color: #00ffff;
      box-shadow: 0px 0px 5px #00ffff, 0px 0px 2px #00ffff;
    }

    #nav-container .icon-bar:nth-of-type(4) {
      background-color: #ff00ff;
      box-shadow: 0px 0px 5px #ff00ff, 0px 0px 2px #ff00ff;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(1) {
      background-color: #00ffff;
      box-shadow: 0px 0px 5px #00ffff, 0px 0px 2px #00ffff;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(2) {
      background-color: #ffff00;
      box-shadow: 0px 0px 5px #ffff00, 0px 0px 2px #ffff00;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(3) {
      background-color: #00ff00;
      box-shadow: 0px 0px 5px #00ff00, 0px 0px 2px #00ff00;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(4) {
      background-color: #ff00ff;
      box-shadow: 0px 0px 5px #ff00ff, 0px 0px 2px #ff00ff;
    }

    #nav-container:focus-within #nav-button {
      pointer-events: none;
    }

    #nav-container:focus-within .icon-bar {
      background-color: #aaa;
      background-image: none !important;
      box-shadow: none !important;
    }

    #nav-button.attention:focus-within .icon-bar {
      background-color: #00ffff;
    }

    #nav-container:focus-within .icon-bar:nth-of-type(1) {
      transform: translate3d(0, 9px, 0) rotate(45deg);
    }

    #nav-container:focus-within .icon-bar:nth-of-type(2),
    #nav-container:focus-within .icon-bar:nth-of-type(3) {
      opacity: 0;
    }

    #nav-container:focus-within .icon-bar:nth-of-type(4) {
      transform: translate3d(0, -9px, 0) rotate(-45deg);
    }

    #nav-content {
      margin-top: 60px;
      padding: 20px;
      position: absolute;
      top: 0;
      left: 0;
      height: calc(100% - 60px);
      overflow-x: clip;
      background-color: #282C34;
      text-align: center;
      pointer-events: auto;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      transform: translateX(-100%);
      transition: transform .3s;
    }

    #nav-content ul {
      height: calc(100% - 60px);
      display: flex;
      flex-direction: column;
      list-style: none;
    }

    #nav-content hr {
      border: 1px solid #444;
    }

    #nav-content li a {
      display: block;
      padding: 10px 5px;
      color: #9fa6b2;
      text-decoration: none;
      transition: color .1s;
    }

    #nav-content li a.attention {
      animation: glowing 1.5s infinite alternate;
    }

    #nav-content li a {
      font-variant: small-caps;
      font-size: 2em;
    }

    #nav-content h4 {
      color: gray;
      font-variant: small-caps;
      padding-top: 1em;
    }

    #nav-content li.modesel a {
      display: inline-block;
      width: 4em;
    }

    #nav-content li:hover {
      background-color: #2c323c;
    }

    #nav-content li:not(.small)+.small {
      margin-top: auto;
    }

    #nav-content li.small {
      display: flex;
      align-self: center;
    }

    #nav-content li.small a {
      font-size: 1em;
    }

    #nav-container:focus-within #nav-content,
    #debug_menu:focus-within {
      transform: none;
    }

    #debug_menu {
      transform: translateX(100%);
      margin-top: 60px;
      right: 0;
      padding: 20px;
      position: absolute;
      top: 0;
      max-width: 95%;
      z-index: 2;
      transition: transform .3s;
      opacity: 95%;
      background-color: black;
    }

    .invisible {
      display: none;
    }

    @keyframes glowing {
      0% {
        color: #00ffff;
      }
    }

    /* camera status / error overlay */
    #cam-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-color: #05060a;
      background-image:
        radial-gradient(40% 40% at 20% 25%, rgba(255, 61, 129, .25), transparent 70%),
        radial-gradient(40% 40% at 80% 20%, rgba(61, 214, 255, .22), transparent 70%),
        radial-gradient(50% 50% at 55% 80%, rgba(124, 92, 255, .22), transparent 70%);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      font-family: -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif;
    }

    #cam-overlay.invisible {
      display: none;
    }

    .cam-card {
      width: 100%;
      max-width: 380px;
      text-align: center;
      color: #e7eaf2;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 20px;
      padding: 32px 26px;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, .7);
    }

    .cam-card .cam-icon {
      font-size: 2.6rem;
      line-height: 1;
    }

    .cam-card h2 {
      margin: 16px 0 8px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
    }

    .cam-card p {
      margin: 0;
      color: #c4cad8;
      font-size: .98rem;
      line-height: 1.6;
    }

    .cam-card .cam-hint {
      margin-top: 16px;
      text-align: left;
      font-size: .82rem;
      color: #99a0b3;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .cam-card .cam-hint b {
      color: #d7dbe6;
    }

    #cam-retry {
      margin-top: 22px;
      width: 100%;
      padding: 15px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      color: #05060a;
      background: linear-gradient(100deg, #ff3d81, #7c5cff);
      box-shadow: 0 10px 30px -12px rgba(124, 92, 255, .7);
    }

    #cam-retry:active {
      transform: translateY(1px);
    }

    .cam-card .cam-spinner {
      width: 30px;
      height: 30px;
      margin: 4px auto 0;
      border: 3px solid rgba(255, 255, 255, .15);
      border-top-color: #3dd6ff;
      border-radius: 50%;
      animation: cam-spin .8s linear infinite;
    }

    @keyframes cam-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .cam-card .cam-back {
      display: inline-block;
      margin-top: 16px;
      color: #3dd6ff;
      text-decoration: none;
      font-size: .9rem;
    }

    /* language toggle pill — sits above the camera overlay */
    .lang-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 1001;
      display: flex;
      gap: 2px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(20, 22, 30, .55);
      border: 1px solid rgba(255, 255, 255, .18);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .lang-toggle button {
      border: 0;
      background: transparent;
      color: #b3b9c8;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: .8rem;
      font-family: -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif;
    }

    .lang-toggle button.on {
      color: #05060a;
      background: linear-gradient(100deg, #3dd6ff, #7c5cff);
    }
  </style>

  <div id="container">
    <video id="video" autoplay="true" playsinline="true" muted="true">
    </video>
  </div>

  <div id="crosshair1" class="crosshairs"></div>
  <div id="crosshair2" class="crosshairs"></div>

  <div class="lang-toggle" role="group" aria-label="Language">
    <button type="button" data-lang="zh" onclick="CFCLang.set('zh')">中</button>
    <button type="button" data-lang="en" onclick="CFCLang.set('en')">EN</button>
  </div>

  <div id="cam-overlay" class="invisible">
    <div class="cam-card">
      <div class="cam-icon" id="cam-icon">📷</div>
      <div class="cam-spinner invisible" id="cam-spinner"></div>
      <h2 id="cam-title">正在启动摄像头…</h2>
      <p id="cam-msg">请在弹出的提示中允许使用摄像头。</p>
      <p class="cam-hint invisible" id="cam-hint"></p>
      <button id="cam-retry" class="invisible" onclick="Recv.retryCamera()">重新授权</button>
      <a class="cam-back" href="index.html">← 返回首页</a>
    </div>
  </div>

  <div id="nav-container" class="mode-auto">
    <div class="bg" onclick="Recv.blurNav();"></div>
    <button id="nav-button" tabindex="0" onclick="Recv.clickNav();">
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
    </button>
    <div id="nav-content" tabindex="-1">
      <ul>
        <li class="modesel">
          <h4>Mode</h4>
          <a class="mode-auto" href="javascript:void(0)" onclick="Recv.setMode('Auto')">Auto</a>
          <a class="mode-b" id="mode-val" href="javascript:void(0)" onclick="Recv.setMode(this.textContent)">B</a>
        </li>
        <li class="small"><a href="javascript:void(0)" onclick="Recv.showDebug()">Debug</a></li>
        <li class="small"><a href="javascript:void(0)" onclick="Recv.toggleFullscreen()">Fullscreen</a></li>
        <li class="small"><a href="https://github.com/sz3/libcimbar">github</a></li>
        <li class="small"><a href="https://github.com/sz3/cfc/releases/latest">android app</a></li>
      </ul>
    </div>
    <div id="debug_menu">
      <button id="debug-button" onclick="Recv.showDebug();"></button>
      <div class="statusbox" id="errorbox"></div>
      <div class="statusbox" id="t0">hi0</div>
      <div class="statusbox" id="t1">hi1</div>
      <div class="statusbox" id="t2">hi2</div>
      <div class="statusbox" id="t3">hi3</div>
      <div class="statusbox" id="framesInFlight"></div>
      <div class="statusbox" id="tdec">%VERSION%</div>
    </div>
  </div>

  <div id="progress_bars">
    <div class="progress"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="recv.js"></script>
  <script src="zstd.js"></script>

  <script type="text/javascript">
    Recv.init_ww(4);
    // keep the camera overlay text in sync with the language toggle
    CFCLang.onChange(function (l) { Recv.applyLang(l); });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./recv-sw.js');
    }
    var video = document.querySelector('#video');

    var Module = {};
    Module.onRuntimeInitialized = () => {
      Recv.init_video(video);
    };
  </script>

  <script src="cimbar_js.js"></script>

</body>

</html>
