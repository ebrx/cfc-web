<!doctype html>
<html lang="en" data-framework="javascript">

<head>
  <title>Cimbar Decoder</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#05060a">
  <link rel="manifest" href="pwa-recv.json">
</head>

<body>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background-color: #05060a;
      overflow: hidden;
      font-family: -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif;
    }

    /* ---- fullscreen camera --------------------------------------------- */
    #container {
      position: fixed;
      inset: 0;
      z-index: -100;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* true fullscreen, no letterbox */
      transition: 1s opacity;
    }

    /* ---- scan frame + aiming / focus guidance -------------------------- */
    #scan-ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #scan-frame {
      position: relative;
      width: min(74vw, 74vh, 460px);
      height: min(74vw, 74vh, 460px);
      /* a calm scrim outside the frame helps the user "aim" */
      box-shadow: 0 0 0 100vmax rgba(5, 6, 10, .45);
      border-radius: 22px;
    }

    /* progress ring drawn on the frame border, sweeping clockwise */
    #progress-ring {
      position: absolute;
      inset: -3px;
      width: calc(100% + 6px);
      height: calc(100% + 6px);
      overflow: visible;
    }

    #progress-ring .ring-track {
      fill: none;
      stroke: rgba(255, 255, 255, .14);
      stroke-width: 3;
    }

    #progress-ring .ring-fill {
      fill: none;
      stroke: #3dd6ff;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      /* start at top-middle and sweep clockwise */
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset .25s ease, stroke .3s;
      filter: drop-shadow(0 0 4px rgba(61, 214, 255, .7));
    }

    /* corner brackets — the aiming guide */
    .corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 4px solid #fff;
      transition: border-color .3s;
    }

    .corner.tl {
      top: -2px;
      left: -2px;
      border-right: 0;
      border-bottom: 0;
      border-radius: 22px 0 0 0;
    }

    .corner.tr {
      top: -2px;
      right: -2px;
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 22px 0 0;
    }

    .corner.bl {
      bottom: -2px;
      left: -2px;
      border-right: 0;
      border-top: 0;
      border-radius: 0 0 0 22px;
    }

    .corner.br {
      bottom: -2px;
      right: -2px;
      border-left: 0;
      border-top: 0;
      border-radius: 0 0 22px 0;
    }

    /* idle: gentle breathing to invite the user to aim/focus */
    #scan-frame[data-state="idle"] .corner {
      animation: aim-pulse 1.8s ease-in-out infinite;
    }

    #scan-frame[data-state="scanning"] .corner {
      border-color: #ffd400;
    }

    #scan-frame[data-state="scanning"] #progress-ring .ring-fill {
      stroke: #ffd400;
      filter: drop-shadow(0 0 4px rgba(255, 212, 0, .7));
    }

    #scan-frame[data-state="receiving"] .corner,
    #scan-frame[data-state="done"] .corner {
      border-color: #00e676;
    }

    #scan-frame[data-state="receiving"] #progress-ring .ring-fill,
    #scan-frame[data-state="done"] #progress-ring .ring-fill {
      stroke: #00e676;
      filter: drop-shadow(0 0 5px rgba(0, 230, 118, .8));
    }

    @keyframes aim-pulse {

      0%,
      100% {
        opacity: .55;
      }

      50% {
        opacity: 1;
      }
    }

    /* status text below the frame (kept centered, never near the address bar) */
    #scan-status {
      margin-top: 26px;
      text-align: center;
      color: #fff;
      text-shadow: 0 1px 6px rgba(0, 0, 0, .8);
    }

    #scan-hint {
      font-size: 1rem;
      font-weight: 600;
    }

    #scan-pct {
      margin-top: 6px;
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: .5px;
      min-height: 1.2em;
      color: #00e676;
    }

    /* ---- floating on-screen controls (no drawer menu) ------------------ */
    #controls {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      z-index: 20;
      display: flex;
      gap: 8px;
    }

    .ctl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 14px;
      background: rgba(20, 22, 30, .55);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      color: #e7eaf2;
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .ctl-btn:active {
      transform: translateY(1px);
    }

    /* ---- debug data sink (hidden; no UI entry) ------------------------- */
    #debug_menu {
      position: fixed;
      top: 0;
      right: 0;
      max-width: 95%;
      padding: 20px;
      z-index: 30;
      background: #000;
      opacity: .95;
      transform: translateX(100%);
      transition: transform .3s;
    }

    #debug_menu:focus-within {
      transform: none;
    }

    .statusbox {
      color: #fff;
      font-size: .85rem;
      word-break: break-all;
    }

    .invisible {
      display: none;
    }

    /* ---- camera status / error overlay --------------------------------- */
    #cam-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-color: #05060a;
      background-image:
        radial-gradient(40% 40% at 20% 25%, rgba(255, 61, 129, .25), transparent 70%),
        radial-gradient(40% 40% at 80% 20%, rgba(61, 214, 255, .22), transparent 70%),
        radial-gradient(50% 50% at 55% 80%, rgba(124, 92, 255, .22), transparent 70%);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    #cam-overlay.invisible {
      display: none;
    }

    .cam-card {
      width: 100%;
      max-width: 380px;
      text-align: center;
      color: #e7eaf2;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 20px;
      padding: 32px 26px;
      box-shadow: 0 24px 60px -20px rgba(0, 0, 0, .7);
    }

    .cam-card .cam-icon {
      font-size: 2.6rem;
      line-height: 1;
    }

    .cam-card h2 {
      margin: 16px 0 8px;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
    }

    .cam-card p {
      margin: 0;
      color: #c4cad8;
      font-size: .98rem;
      line-height: 1.6;
    }

    .cam-card .cam-hint {
      margin-top: 16px;
      text-align: left;
      font-size: .82rem;
      color: #99a0b3;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .cam-card .cam-hint b {
      color: #d7dbe6;
    }

    #cam-retry {
      margin-top: 22px;
      width: 100%;
      padding: 15px;
      border: 0;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 700;
      color: #05060a;
      background: linear-gradient(100deg, #ff3d81, #7c5cff);
      box-shadow: 0 10px 30px -12px rgba(124, 92, 255, .7);
    }

    #cam-retry:active {
      transform: translateY(1px);
    }

    .cam-card .cam-spinner {
      width: 30px;
      height: 30px;
      margin: 4px auto 0;
      border: 3px solid rgba(255, 255, 255, .15);
      border-top-color: #3dd6ff;
      border-radius: 50%;
      animation: cam-spin .8s linear infinite;
    }

    @keyframes cam-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .cam-card .cam-back {
      display: inline-block;
      margin-top: 16px;
      color: #3dd6ff;
      text-decoration: none;
      font-size: .9rem;
    }

    /* language toggle pill — sits above the camera overlay */
    .lang-toggle {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: 12px;
      z-index: 1001;
      display: flex;
      gap: 2px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(20, 22, 30, .55);
      border: 1px solid rgba(255, 255, 255, .18);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .lang-toggle button {
      border: 0;
      background: transparent;
      color: #b3b9c8;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: .8rem;
      font-family: inherit;
    }

    .lang-toggle button.on {
      color: #05060a;
      background: linear-gradient(100deg, #3dd6ff, #7c5cff);
    }
  </style>

  <div id="container">
    <video id="video" autoplay="true" playsinline="true" muted="true">
    </video>
  </div>

  <!-- scan frame: aiming guide + progress ring -->
  <div id="scan-ui">
    <div id="scan-frame" data-state="idle">
      <svg id="progress-ring" viewBox="0 0 100 100" preserveAspectRatio="none">
        <rect class="ring-track" x="2" y="2" width="96" height="96" rx="9" pathLength="100"></rect>
        <rect class="ring-fill" x="2" y="2" width="96" height="96" rx="9" pathLength="100"></rect>
      </svg>
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
    </div>
    <div id="scan-status">
      <div id="scan-hint"></div>
      <div id="scan-pct"></div>
    </div>
  </div>

  <!-- on-screen control: Home (no drawer menu) -->
  <div id="controls">
    <a class="ctl-btn" href="index.html" id="btn-home" aria-label="Home">‹</a>
  </div>

  <div class="lang-toggle" role="group" aria-label="Language">
    <button type="button" data-lang="zh" onclick="CFCLang.set('zh')">中</button>
    <button type="button" data-lang="en" onclick="CFCLang.set('en')">EN</button>
  </div>

  <div id="cam-overlay" class="invisible">
    <div class="cam-card">
      <div class="cam-icon" id="cam-icon">📷</div>
      <div class="cam-spinner invisible" id="cam-spinner"></div>
      <h2 id="cam-title">正在启动摄像头…</h2>
      <p id="cam-msg">请在弹出的提示中允许使用摄像头。</p>
      <p class="cam-hint invisible" id="cam-hint"></p>
      <button id="cam-retry" class="invisible" onclick="Recv.retryCamera()">重新授权</button>
      <a class="cam-back" href="index.html">← 返回首页</a>
    </div>
  </div>

  <!-- debug data sink: hidden, no user-facing entry. Recv.showDebug() reveals it -->
  <div id="debug_menu">
    <button id="debug-button" onclick="Recv.showDebug();"></button>
    <div class="statusbox" id="errorbox"></div>
    <div class="statusbox" id="t0">hi0</div>
    <div class="statusbox" id="t1">hi1</div>
    <div class="statusbox" id="t2">hi2</div>
    <div class="statusbox" id="t3">hi3</div>
    <div class="statusbox" id="framesInFlight"></div>
    <div class="statusbox" id="tdec">%VERSION%</div>
  </div>

  <script src="i18n.js"></script>
  <script src="recv.js"></script>
  <script src="zstd.js"></script>

  <script type="text/javascript">
    Recv.init_ww(4);
    // keep the camera overlay + scan UI text in sync with the language toggle
    CFCLang.onChange(function (l) { Recv.applyLang(l); });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./recv-sw.js');
    }
    var video = document.querySelector('#video');

    var Module = {};
    Module.onRuntimeInitialized = () => {
      Recv.init_video(video);
    };
  </script>

  <script src="cimbar_js.js"></script>

</body>

</html>
